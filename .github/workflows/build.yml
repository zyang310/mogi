# Build — runs on every push to main and on PRs targeting main.
#
# Purpose: prove the app always compiles and passes checks, and produce a
# downloadable macOS build for testing. This does NOT publish a public release
# (see release.yml, which runs on version tags). The artifact here is attached to
# the workflow run and is only reachable by people with repo access.
name: Build

# The landing page (site/) ships via pages.yml and shares no code with the app,
# so editing copy there shouldn't spend a full macOS universal build.
on:
  push:
    branches: [main]
    paths-ignore: ["site/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["site/**"]

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify (macOS universal)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # stays in sync with the module's Go version
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # ── Frontend first ───────────────────────────────────────────────────
      # main.go embeds the built UI with `//go:embed all:frontend/dist`, so that
      # directory must exist before ANY `go build`/`go test` of package main.
      # frontend/dist is gitignored (a build output), so we build it here. This
      # step also type-checks the frontend (npm run build runs `tsc && vite build`).
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── Backend checks (frontend/dist now exists for the embed) ──────────
      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test ./...

      - name: Gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      # ── Package the app ──────────────────────────────────────────────────
      # -s skips re-building the frontend (we already built frontend/dist above).
      # The version is a throwaway "dev-<sha>" so these builds never look like a
      # release to the in-app updater (it ignores non-semver versions).
      - name: Wails build (darwin/universal)
        run: wails build -platform darwin/universal -s -ldflags "-X main.version=dev-${{ github.sha }}"

      - name: Package .app
        run: |
          cd build/bin
          app="$(ls -d *.app | head -1)"
          ditto -c -k --keepParent "$app" "Mogi-dev-${GITHUB_SHA::7}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mogi-macos-universal
          path: build/bin/Mogi-dev-*.zip
          if-no-files-found: error
