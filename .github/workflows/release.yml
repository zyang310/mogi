# Release — runs when a version tag (vX.Y.Z) is pushed.
#
# Purpose: build the versioned macOS app and publish it as a public GitHub
# Release. This is the build anyone can download AND the one the in-app updater
# compares against. Cut a release with:
#
#     git tag v0.2.0 && git push origin v0.2.0
#
# The tag is the single source of truth for the version: it is stamped into the
# binary (-ldflags) and the macOS plist (wails.json productVersion).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    name: Build & publish (macOS universal)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + the annotated tag object, so we can read its message below

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"            # e.g. v0.2.0
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "num=${TAG#v}" >> "$GITHUB_OUTPUT"  # 0.2.0 (no leading v) for the plist

      # Curated release highlights come from the annotated tag's message body (the
      # text after the tag's subject line). Lightweight tags have no body, so this
      # is empty and the notes fall back to just the auto-generated changelog.
      - name: Extract release highlights from tag
        id: notes
        run: |
          BODY="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents:body)')"
          {
            echo "highlights<<__NOTES_EOF__"
            echo "$BODY"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      # Stamp the macOS plist version so Finder "Get Info" matches the tag.
      - name: Stamp plist version
        env:
          NUM: ${{ steps.ver.outputs.num }}
        run: |
          node -e "const fs=require('fs');const p='wails.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.info=j.info||{};j.info.productVersion=process.env.NUM;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      # wails build also builds the frontend (wails.json frontend:build). The tag
      # is injected as main.version, which is what the in-app updater reads.
      - name: Wails build (darwin/universal)
        run: wails build -platform darwin/universal -ldflags "-X main.version=${{ steps.ver.outputs.tag }}"

      - name: Package .app
        id: pkg
        run: |
          cd build/bin
          app="$(ls -d *.app | head -1)"
          zip="AI-Interviewer-${{ steps.ver.outputs.tag }}-macos-universal.zip"
          ditto -c -k --keepParent "$app" "$zip"
          echo "zip=build/bin/$zip" >> "$GITHUB_OUTPUT"
          echo "appname=$app" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.zip }}
          generate_release_notes: true
          body: |
            ## AI Interviewer ${{ steps.ver.outputs.tag }}

            ${{ steps.notes.outputs.highlights }}

            macOS universal build — runs on Apple Silicon and Intel Macs.

            ### Install
            1. Download the `.zip` below and unzip it.
            2. Drag **${{ steps.pkg.outputs.appname }}** into your **Applications** folder.
            3. This app is **unsigned**, so the first launch needs one extra step to get
               past macOS Gatekeeper (you only do this once):
               - **Right-click** the app → **Open** → **Open** in the dialog, **or**
               - run in Terminal: `xattr -cr "/Applications/${{ steps.pkg.outputs.appname }}"`

            Already have it installed? The app checks for updates on launch and shows a
            banner when a newer version is here.
